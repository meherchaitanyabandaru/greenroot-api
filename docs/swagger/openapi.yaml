openapi: 3.0.3
info:
  title: GreenRoot API
  version: 0.1.0
  description: Modular Go chi backend for the GreenRoot platform.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Platform
  - name: Auth
  - name: Users
  - name: Plants
  - name: Nurseries
  - name: Inventory
  - name: Plant Requests
  - name: Orders
  - name: Payments
  - name: Subscriptions
  - name: Vehicles
  - name: Drivers
  - name: Dispatches
  - name: Notifications
  - name: Attachments
  - name: Audit
  - name: Admin
  - name: Tracking
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: API process is alive
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: API process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /readyz:
    get:
      tags: [Health]
      summary: Readiness check
      responses:
        "200":
          description: API is ready to serve traffic
  /api/v1:
    get:
      tags: [Platform]
      summary: API module catalog
      responses:
        "200":
          description: Available and planned API modules
  /api/v1/auth/send-otp:
    post:
      tags: [Auth]
      summary: Send OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOTPRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOTPResponse"
        "400":
          description: Invalid request
  /api/v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOTPRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid OTP
  /api/v1/auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logged out
        "401":
          description: Invalid refresh token
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Invalid access token
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Current user profile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user profile
    put:
      tags: [Users]
      summary: Update current user profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated user profile
  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User profile
  /api/v1/users/{id}/addresses:
    get:
      tags: [Users]
      summary: List user addresses
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User addresses
    post:
      tags: [Users]
      summary: Create user address
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressRequest"
      responses:
        "201":
          description: Address created
  /api/v1/users/addresses/{addressId}:
    put:
      tags: [Users]
      summary: Update user address
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AddressID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressRequest"
      responses:
        "200":
          description: Address updated
    delete:
      tags: [Users]
      summary: Delete user address
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AddressID"
      responses:
        "200":
          description: Address deleted
  /api/v1/users/{id}/roles:
    get:
      tags: [Users]
      summary: List user roles
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User roles
  /api/v1/users/{id}/sessions:
    get:
      tags: [Users]
      summary: List user sessions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User sessions
  /api/v1/plants:
    get:
      tags: [Plants]
      summary: List plants
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: category_id
          in: query
          schema:
            type: integer
        - name: plant_type
          in: query
          schema:
            type: string
        - name: light_requirement
          in: query
          schema:
            type: string
        - name: water_requirement
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [id, scientific_name, common_name, plant_type, light_requirement, water_requirement, created_at, updated_at]
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Plant catalog
    post:
      tags: [Plants]
      summary: Create plant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantRequest"
      responses:
        "201":
          description: Plant created
  /api/v1/plants/categories:
    get:
      tags: [Plants]
      summary: List plant categories
      responses:
        "200":
          description: Plant categories
  /api/v1/plants/{id}:
    get:
      tags: [Plants]
      summary: Get plant
      parameters:
        - $ref: "#/components/parameters/PlantID"
      responses:
        "200":
          description: Plant detail
    put:
      tags: [Plants]
      summary: Update plant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantRequest"
      responses:
        "200":
          description: Plant updated
    delete:
      tags: [Plants]
      summary: Delete plant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlantID"
      responses:
        "200":
          description: Plant deleted
  /api/v1/plants/{id}/images:
    post:
      tags: [Plants]
      summary: Add plant image
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantImageRequest"
      responses:
        "201":
          description: Plant image created
  /api/v1/plants/{id}/care-guide:
    get:
      tags: [Plants]
      summary: Get plant care guide
      parameters:
        - $ref: "#/components/parameters/PlantID"
      responses:
        "200":
          description: Plant care guide
  /api/v1/nurseries:
    get:
      tags: [Nurseries]
      summary: List nurseries
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: nursery_status
          in: query
          schema:
            type: string
        - name: verification_status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Nursery list
    post:
      tags: [Nurseries]
      summary: Create nursery
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NurseryRequest"
      responses:
        "201":
          description: Nursery created
  /api/v1/nurseries/{id}:
    get:
      tags: [Nurseries]
      summary: Get nursery
      parameters:
        - $ref: "#/components/parameters/NurseryID"
      responses:
        "200":
          description: Nursery detail
    put:
      tags: [Nurseries]
      summary: Update nursery
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NurseryID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NurseryRequest"
      responses:
        "200":
          description: Nursery updated
    delete:
      tags: [Nurseries]
      summary: Delete nursery
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NurseryID"
      responses:
        "200":
          description: Nursery deleted
  /api/v1/nurseries/{id}/addresses:
    get:
      tags: [Nurseries]
      summary: List nursery addresses
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NurseryID"
      responses:
        "200":
          description: Nursery addresses
    post:
      tags: [Nurseries]
      summary: Create nursery address
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NurseryID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NurseryAddressRequest"
      responses:
        "201":
          description: Nursery address created
  /api/v1/nurseries/addresses/{addressId}:
    put:
      tags: [Nurseries]
      summary: Update nursery address
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AddressID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NurseryAddressRequest"
      responses:
        "200":
          description: Nursery address updated
    delete:
      tags: [Nurseries]
      summary: Delete nursery address
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AddressID"
      responses:
        "200":
          description: Nursery address deleted
  /api/v1/nurseries/{id}/users:
    get:
      tags: [Nurseries]
      summary: List nursery users
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NurseryID"
      responses:
        "200":
          description: Nursery users
    post:
      tags: [Nurseries]
      summary: Add nursery user
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NurseryID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NurseryUserRequest"
      responses:
        "201":
          description: Nursery user added
  /api/v1/nurseries/{id}/users/{userId}:
    delete:
      tags: [Nurseries]
      summary: Remove nursery user
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NurseryID"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Nursery user removed
  /api/v1/inventory:
    get:
      tags: [Inventory]
      summary: List inventory
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
          description: Search by nursery, scientific name, common name, or size.
        - name: nursery_id
          in: query
          schema:
            type: integer
        - name: plant_id
          in: query
          schema:
            type: integer
        - name: size_id
          in: query
          schema:
            type: integer
        - name: inventory_status
          in: query
          schema:
            type: string
            enum: [AVAILABLE, LOW_STOCK, OUT_OF_STOCK, RESERVED, DISCONTINUED]
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [id, nursery_name, scientific_name, common_name, size_code, available_quantity, inventory_status, last_updated_at, created_at]
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Inventory list
    post:
      tags: [Inventory]
      summary: Create inventory item
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryRequest"
      responses:
        "201":
          description: Inventory item created
  /api/v1/inventory/{id}:
    get:
      tags: [Inventory]
      summary: Get inventory item
      parameters:
        - $ref: "#/components/parameters/InventoryID"
      responses:
        "200":
          description: Inventory item
    put:
      tags: [Inventory]
      summary: Update inventory item
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/InventoryID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryRequest"
      responses:
        "200":
          description: Inventory item updated
    delete:
      tags: [Inventory]
      summary: Delete inventory item
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/InventoryID"
      responses:
        "200":
          description: Inventory item deleted
  /api/v1/nurseries/{nurseryId}/inventory:
    get:
      tags: [Inventory]
      summary: List inventory by nursery
      parameters:
        - name: nurseryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Nursery inventory
  /api/v1/plants/{plantId}/inventory:
    get:
      tags: [Inventory]
      summary: List inventory by plant
      parameters:
        - name: plantId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Plant inventory
  /api/v1/plant-requests:
    get:
      tags: [Plant Requests]
      summary: List plant requests
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
        - name: nursery_id
          in: query
          schema:
            type: integer
        - name: plant_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Plant request list
    post:
      tags: [Plant Requests]
      summary: Create plant request
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantRequestRequest"
      responses:
        "201":
          description: Plant request created
  /api/v1/plant-requests/{id}:
    get:
      tags: [Plant Requests]
      summary: Get plant request
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlantRequestID"
      responses:
        "200":
          description: Plant request detail
    put:
      tags: [Plant Requests]
      summary: Update plant request
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlantRequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantRequestRequest"
      responses:
        "200":
          description: Plant request updated
    delete:
      tags: [Plant Requests]
      summary: Cancel plant request
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlantRequestID"
      responses:
        "200":
          description: Plant request cancelled
  /api/v1/plant-requests/{id}/responses:
    get:
      tags: [Plant Requests]
      summary: List plant request responses
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlantRequestID"
      responses:
        "200":
          description: Plant request responses
    post:
      tags: [Plant Requests]
      summary: Respond to plant request
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PlantRequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantRequestResponseRequest"
      responses:
        "201":
          description: Plant request response created
  /api/v1/plant-requests/responses/{responseId}:
    put:
      tags: [Plant Requests]
      summary: Update plant request response
      security:
        - BearerAuth: []
      parameters:
        - name: responseId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantRequestResponseUpdateRequest"
      responses:
        "200":
          description: Plant request response updated
  /api/v1/orders:
    get:
      tags: [Orders]
      summary: List orders
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
          description: Search by order number, buyer name, nursery name, or notes.
        - name: buyer_user_id
          in: query
          schema:
            type: integer
        - name: nursery_id
          in: query
          schema:
            type: integer
        - name: order_status
          in: query
          schema:
            type: string
            enum: [PENDING, CONFIRMED, PARTIALLY_FULFILLED, COMPLETED, CANCELLED]
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [id, order_number, buyer_name, seller_nursery, order_status, total_amount, order_date, created_at]
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Order list
    post:
      tags: [Orders]
      summary: Create order
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "201":
          description: Order created
  /api/v1/orders/{id}:
    get:
      tags: [Orders]
      summary: Get order
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderID"
      responses:
        "200":
          description: Order detail
    delete:
      tags: [Orders]
      summary: Delete order
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderID"
      responses:
        "200":
          description: Order deleted
  /api/v1/orders/{id}/status:
    put:
      tags: [Orders]
      summary: Update order status
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusRequest"
      responses:
        "200":
          description: Order status updated
  /api/v1/orders/{id}/items:
    get:
      tags: [Orders]
      summary: List order items
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderID"
      responses:
        "200":
          description: Order items
    post:
      tags: [Orders]
      summary: Add order item
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderItemRequest"
      responses:
        "201":
          description: Order item created
  /api/v1/orders/items/{itemId}:
    put:
      tags: [Orders]
      summary: Update order item
      security:
        - BearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderItemRequest"
      responses:
        "200":
          description: Order item updated
    delete:
      tags: [Orders]
      summary: Delete order item
      security:
        - BearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Order item deleted
  /api/v1/payments:
    get:
      tags: [Payments]
      summary: List payments
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
          description: Search by order number, subscription plan, payer, transaction reference, provider ids, or notes.
        - name: payment_for
          in: query
          schema:
            type: string
            enum: [ORDER, SUBSCRIPTION]
        - name: order_id
          in: query
          schema:
            type: integer
        - name: subscription_id
          in: query
          schema:
            type: integer
        - name: payer_user_id
          in: query
          schema:
            type: integer
        - name: payment_status
          in: query
          schema:
            type: string
            enum: [PENDING, SUCCESS, FAILED, REFUNDED, CANCELLED]
        - name: payment_method
          in: query
          schema:
            type: string
            enum: [UPI, CARD, CASH, BANK_TRANSFER, NET_BANKING, WALLET, COD, CHEQUE, OTHER]
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [id, payment_for, order_number, subscription_plan, payer_name, amount, payment_method, payment_status, payment_date, created_at]
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
