    NotificationDeviceID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    NotificationTemplateID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    AttachmentID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SendOTPRequest:
      type: object
      required: [mobile]
      properties:
        mobile:
          type: string
          example: "9000000002"
    VerifyOTPRequest:
      type: object
      required: [mobile, otp]
      properties:
        mobile:
          type: string
          example: "9000000002"
        otp:
          type: string
          example: "123456"
        device_type:
          type: string
          example: "MOBILE"
        os_name:
          type: string
          example: "ANDROID"
        app_version:
