      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PlantRequestID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    OrderID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PaymentID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SubscriptionPlanID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SubscriptionID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    VehicleID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    DriverID:
